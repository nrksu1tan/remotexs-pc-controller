<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RemoteXS</title>

    <style>
        :root {
            --bg: #000000;
            --surface: rgba(255, 255, 255, 0.07);
            --surface-hi: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.10);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.45);
            --text-dimmer: rgba(255, 255, 255, 0.22);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            font-family: var(--font);
        }

        body {
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }

        .bg-base {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: #000;
        }

        #cover-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.18) saturate(1.4);
            opacity: 0;
            transition: opacity 1.8s ease;
            transform: scale(1.15);
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: max(14px, var(--safe-top));
        }

        /* Header */
        .header {
            flex-shrink: 0;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 22px;
            z-index: 10;
        }

        .logo {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--text-dimmer);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--text-dimmer);
            border-radius: 50%;
            transition: background 0.4s, box-shadow 0.4s;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: #30D158;
            box-shadow: 0 0 8px rgba(48, 209, 88, 0.5);
        }

        .header-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
        }

        .header-btn:active {
            background: var(--surface-hi);
            color: var(--text);
        }

        /* Content */
        .content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            padding: 8px 22px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(6px) scale(0.99);
            transition: opacity 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0) scale(1);
        }

        /* Media tab */
        .art-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            padding-bottom: 12px;
        }

        .art-box {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 22px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.7), 0 0 0 0.5px var(--border);
            background-size: cover;
            background-position: center;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .art-box.changing {
            opacity: 0;
            transform: scale(0.96);
        }

        .media-controls {
            padding-bottom: calc(76px + var(--safe-bottom));
        }

        .track-info {
            text-align: center;
            margin-bottom: 22px;
        }

        .t-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .t-artist {
            font-size: 15px;
            color: var(--text-dim);
            letter-spacing: -0.005em;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn-icon {
            color: rgba(255, 255, 255, 0.65);
            background: var(--surface);
            padding: 12px 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 0.5px solid var(--border);
            transition: background 0.15s, transform 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:active {
            transform: scale(0.88);
            background: var(--surface-hi);
            color: white;
        }

        .play-btn {
            width: 68px;
            height: 68px;
            background: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(255, 255, 255, 0.12);
            transition: transform 0.15s, background 0.15s;
            flex-shrink: 0;
        }

        .play-btn:active {
            transform: scale(0.91);
            background: rgba(255, 255, 255, 0.82);
        }

        /* Volume */
        .volume-container {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--border);
            padding: 8px;
            border-radius: 100px;
            height: 60px;
        }

        .mute-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            flex-shrink: 0;
            transition: background 0.15s, transform 0.15s;
        }

        .mute-btn:active {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(0.92);
        }

        .vol-slider-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
        }

        .vol-icon {
            color: var(--text-dimmer);
            flex-shrink: 0;
        }

        input[type=range].main-vol {
            flex: 1;
            -webkit-appearance: none;
            background: transparent;
            touch-action: none;
        }

        input[type=range].main-vol::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 2px;
        }

        input[type=range].main-vol::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            margin-top: -10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        /* Mouse tab */
        #tab-mouse {
            touch-action: none;
            padding-bottom: calc(86px + var(--safe-bottom));
        }

        .pad-area {
            flex: 1;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 0.5px solid var(--border);
            margin-bottom: 14px;
            position: relative;
        }

        .pad-area::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 50%;
        }

        .mouse-row {
            display: flex;
            gap: 12px;
            height: 64px;
            flex-shrink: 0;
        }

        .m-btn {
            flex: 1;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-dim);
            transition: background 0.12s, color 0.12s, transform 0.12s;
        }

        .m-btn:active {
            background: white;
            color: black;
            transform: scale(0.97);
        }

        /* Mixer tab */
        #tab-mixer {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            padding-bottom: calc(100px + var(--safe-bottom));
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            margin-top: 4px;
            padding-left: 2px;
        }

        .mix-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--border);
            padding: 13px 16px;
            border-radius: 18px;
            margin-bottom: 10px;
        }

        .app-img {
            width: 42px;
            height: 42px;
            border-radius: 11px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px;
            flex-shrink: 0;
        }

        .app-ph {
            width: 42px;
            height: 42px;
            border-radius: 11px;
            background: rgba(255, 255, 255, 0.07);
            border: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dimmer);
            flex-shrink: 0;
        }

        .app-name {
            flex: 1;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(255, 255, 255, 0.85);
        }

        input[type=range].mix-vol {
            width: 100px;
            -webkit-appearance: none;
            background: transparent;
            touch-action: none;
        }

        input[type=range].mix-vol::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.14);
            border-radius: 2px;
        }

        input[type=range].mix-vol::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            margin-top: -7px;
            border-radius: 50%;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
        }

        /* Dock */
        .dock-wrapper {
            position: fixed;
            bottom: max(14px, var(--safe-bottom));
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 100;
        }

        .dock {
            pointer-events: auto;
            background: rgba(28, 28, 30, 0.75);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            padding: 6px 8px;
            border-radius: 100px;
            display: flex;
            gap: 2px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        inset 0 0 0 0.5px rgba(255, 255, 255, 0.04);
        }

        .dock-btn {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.38);
            border-radius: 100px;
            transition: all 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
        }

        .dock-btn:active {
            transform: scale(0.86) !important;
        }

        .dock-btn.active {
            color: white;
            background: rgba(255, 255, 255, 0.12);
        }

        /* Setup */
        #setup {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
        }

        #setup.hidden {
            display: none;
        }

        .setup-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--text-dimmer);
            margin-bottom: 24px;
        }

        .ip-inp {
            background: rgba(255, 255, 255, 0.07);
            border: 0.5px solid var(--border);
            color: white;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 17px;
            text-align: center;
            margin-bottom: 14px;
            width: 240px;
            outline: none;
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            letter-spacing: 0.02em;
        }

        .ip-inp:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.10);
        }

        .con-btn {
            background: white;
            color: black;
            border: none;
            padding: 14px 44px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.01em;
            cursor: pointer;
            font-family: var(--font);
            transition: opacity 0.15s;
        }

        .con-btn:active {
            opacity: 0.8;
        }

        .setup-footer {
            position: absolute;
            bottom: max(24px, var(--safe-bottom));
            font-size: 11px;
            color: var(--text-dimmer);
        }
    </style>
</head>

<body>
    <div class="bg-base"></div>
    <div id="cover-bg"></div>

    <div class="app-layout">
        <div class="header">
            <div class="logo">
                <div id="status-dot" class="status-dot"></div>
                RemoteXS
            </div>
            <div class="header-btn" onclick="document.getElementById('setup').classList.remove('hidden')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </div>
        </div>

        <div class="content-area">

            <!-- MEDIA -->
            <div id="tab-media" class="view active">
                <div class="art-container">
                    <div id="art" class="art-box"></div>
                </div>

                <div class="media-controls">
                    <div class="track-info">
                        <div id="track" class="t-title">Not Playing</div>
                        <div id="artist" class="t-artist">System Idle</div>
                    </div>

                    <div class="controls-row">
                        <div class="btn-icon" ontouchend="send('prev')">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="19 20 9 12 19 4 19 20"/>
                                <line x1="5" x2="5" y1="19" y2="5"/>
                            </svg>
                        </div>
                        <div class="play-btn" ontouchend="send('play_pause')">
                            <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="black" stroke="none">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </div>
                        <div class="btn-icon" ontouchend="send('next')">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="5 4 15 12 5 20 5 4"/>
                                <line x1="19" x2="19" y1="5" y2="19"/>
                            </svg>
                        </div>
                    </div>

                    <div class="volume-container">
                        <div class="mute-btn" ontouchend="send('mute')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <line x1="23" x2="17" y1="9" y2="15"/>
                                <line x1="17" x2="23" y1="9" y2="15"/>
                            </svg>
                        </div>
                        <div class="vol-slider-wrapper">
                            <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            </svg>
                            <input type="range" class="main-vol" min="0" max="100"
                                oninput="send('set_vol', {id: -1, vol: parseInt(this.value)})">
                            <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MOUSE -->
            <div id="tab-mouse" class="view">
                <div id="trackpad" class="pad-area"></div>
                <div class="mouse-row">
                    <div class="m-btn" ontouchend="send('click_left')">Left</div>
                    <div class="m-btn" ontouchend="send('click_right')">Right</div>
                </div>
            </div>

            <!-- MIXER -->
            <div id="tab-mixer" class="view">
                <div class="section-title">Mixer</div>
                <div id="mixer-list">
                    <div style="text-align:center; padding:50px 0; color:var(--text-dimmer); font-size:14px;">
                        Connecting...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- DOCK -->
    <div class="dock-wrapper">
        <div class="dock">
            <div class="dock-btn active" onclick="go('media', this)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                </svg>
            </div>
            <div class="dock-btn" onclick="go('mouse', this)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/>
                </svg>
            </div>
            <div class="dock-btn" onclick="go('mixer', this); loadMixer()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="21" x2="14" y1="4" y2="4"/>
                    <line x1="10" x2="3" y1="4" y2="4"/>
                    <line x1="21" x2="12" y1="12" y2="12"/>
                    <line x1="8" x2="3" y1="12" y2="12"/>
                    <line x1="21" x2="16" y1="20" y2="20"/>
                    <line x1="12" x2="3" y1="20" y2="20"/>
                    <circle cx="12" cy="4" r="2"/>
                    <circle cx="10" cy="12" r="2"/>
                    <circle cx="14" cy="20" r="2"/>
                </svg>
            </div>
            <div class="dock-btn" onclick="location.href='/keyboard'">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2"/>
                    <path d="M8 8h.01M12 8h.01M16 8h.01M8 12h.01M12 12h.01M16 12h.01M10 16h4"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- SETUP -->
    <div id="setup" class="hidden">
        <div class="setup-label">Connect to PC</div>
        <input id="ip" class="ip-inp" placeholder="192.168.x.x:8080" inputmode="url">
        <button class="con-btn" onclick="saveIp()">Connect</button>
        <div class="setup-footer">RemoteXS v2.2</div>
    </div>

    <script>
        document.addEventListener('gesturestart', e => e.preventDefault());

        let ip = localStorage.getItem('xrd_ip');
        if (!ip) {
            document.getElementById('setup').classList.remove('hidden');
        } else {
            document.getElementById('ip').value = ip;
        }

        let isDragging = false;

        function saveIp() {
            const val = document.getElementById('ip').value.trim();
            if (!val) return;
            ip = val;
            localStorage.setItem('xrd_ip', ip);
            document.getElementById('setup').classList.add('hidden');
            ping();
        }

        function go(name, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(5);
        }

        async function send(cmd, data = {}) {
            if (!ip) return;
            try {
                await fetch(`http://${ip}/command`, {
                    method: 'POST',
                    body: JSON.stringify({ cmd, ...data })
                });
            } catch {}
        }

        // Trackpad
        const pad = document.getElementById('trackpad');
        let lx = 0, ly = 0, lastTouchCount = 0;

        pad.addEventListener('touchstart', e => {
            lx = e.touches[0].clientX;
            ly = e.touches[0].clientY;
            lastTouchCount = e.touches.length;
        }, { passive: false });

        pad.addEventListener('touchend', e => {
            if (e.touches.length > 0) {
                lx = e.touches[0].clientX;
                ly = e.touches[0].clientY;
            }
            lastTouchCount = e.touches.length;
        });

        pad.addEventListener('touchmove', e => {
            if (e.cancelable) e.preventDefault();
            if (e.touches.length !== lastTouchCount) {
                lastTouchCount = e.touches.length;
                if (e.touches.length > 0) {
                    lx = e.touches[0].clientX;
                    ly = e.touches[0].clientY;
                }
                return;
            }
            if (e.touches.length === 2) {
                const cy = e.touches[0].clientY;
                const dy = -(cy - ly) * 2.5;
                if (Math.abs(dy) > 1) send('scroll', { y: dy });
                ly = cy;
            } else if (e.touches.length === 1) {
                const cx = e.touches[0].clientX;
                const cy = e.touches[0].clientY;
                const dx = (cx - lx) * 2.0;
                const dy = (cy - ly) * 2.0;
                if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) send('mouse_move', { x: dx, y: dy });
                lx = cx; ly = cy;
            }
        }, { passive: false });

        function setupSliderEvents() {
            document.querySelectorAll('input[type=range]').forEach(sl => {
                sl.addEventListener('touchstart', () => { isDragging = true; }, { passive: true });
                sl.addEventListener('touchend', () => {
                    setTimeout(() => { isDragging = false; }, 800);
                }, { passive: true });
                sl.addEventListener('mousedown', () => { isDragging = true; });
                sl.addEventListener('mouseup', () => { setTimeout(() => { isDragging = false; }, 200); });
            });
        }

        window.addEventListener('load', setupSliderEvents);

        async function loadMixer() {
            if (!ip) return;
            const list = document.getElementById('mixer-list');
            list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-dimmer);font-size:14px;">Loading...</div>';
            try {
                const apps = await fetch(`http://${ip}/mixer`).then(r => r.json());
                list.innerHTML = '';
                apps.forEach(app => {
                    const div = document.createElement('div');
                    div.className = 'mix-item';
                    const speakerSvg = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
                    const cpuSvg = '<rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/>';
                    const iconHtml = app.icon
                        ? `<img src="data:image/png;base64,${app.icon}" class="app-img" alt="">`
                        : `<div class="app-ph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${app.pid === -1 ? speakerSvg : cpuSvg}</svg></div>`;
                    div.innerHTML = `
                        ${iconHtml}
                        <div class="app-name">${app.name}</div>
                        <input type="range" class="mix-vol" min="0" max="100" value="${app.vol}"
                               oninput="send('set_vol', {id:${app.pid}, vol:parseInt(this.value)})">
                    `;
                    list.appendChild(div);
                });
                setupSliderEvents();
            } catch {
                list.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-dimmer);font-size:14px;">Disconnected</div>';
            }
        }

        let lastTitle = '';
        let lastPlayingState = null;

        async function ping() {
            if (!ip) return;
            try {
                const res = await fetch(`http://${ip}/ping`).then(r => r.json());
                document.getElementById('status-dot').classList.add('online');

                const parts = res.window.split(' • ');
                const title = parts[0] || 'Not Playing';
                const artist = parts[1] || 'System Idle';

                if (title !== lastTitle) {
                    lastTitle = title;
                    const artEl = document.getElementById('art');
                    artEl.classList.add('changing');
                    setTimeout(() => {
                        document.getElementById('track').textContent = title;
                        document.getElementById('artist').textContent = artist;
                        if (res.cover) {
                            const url = `url('data:image/png;base64,${res.cover}')`;
                            artEl.style.backgroundImage = url;
                            document.getElementById('cover-bg').style.backgroundImage = url;
                            document.getElementById('cover-bg').style.opacity = '1';
                        } else {
                            artEl.style.backgroundImage = '';
                            document.getElementById('cover-bg').style.opacity = '0';
                        }
                        artEl.classList.remove('changing');
                    }, 280);
                }

                if (res.playing !== lastPlayingState) {
                    lastPlayingState = res.playing;
                    const icon = document.getElementById('play-icon');
                    if (res.playing) {
                        icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                        icon.setAttribute('fill', 'black');
                    } else {
                        icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
                        icon.setAttribute('fill', 'black');
                    }
                }

                const sl = document.querySelector('.main-vol');
                if (sl && !isDragging) sl.value = res.volume;

            } catch {
                document.getElementById('status-dot').classList.remove('online');
            }
        }

        if (ip) ping();
        setInterval(ping, 400);
    </script>
</body>

</html>
